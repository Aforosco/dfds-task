name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  IMAGE_NAME: dfds-visit-management-api

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — BUILD & TEST
  # ─────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ← updated

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4.3.1    # ← updated
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          Jwt__Key: test-secret-key-min-32-characters-long!!
          Jwt__Issuer: DFDSBackend
          Jwt__Audience: DFDSClient

  # ─────────────────────────────────────────
  # JOB 2 — PUBLISH DOCKER IMAGE
  # ─────────────────────────────────────────
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ← updated

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0  # ← add this

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0     # ← updated
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5.7.0  
        with:
          images: ghcr.io/${{ github.repository_owner }}/dfds-visit-management-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.15.0  
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max