services:
  api:
    build:
      context: .                    # ← current folder is the API root
      dockerfile: Dockerfile
    container_name: dfds_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=DFDSVisitDb;Username=postgres;Password=postgres
      - Jwt__Key=your-super-secret-key-min-32-chars!!
      - Jwt__Issuer=DFDSBackend
      - Jwt__Audience=DFDSClient
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16
    container_name: dfds_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: DFDSVisitDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: